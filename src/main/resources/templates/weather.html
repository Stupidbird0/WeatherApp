<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container mt-5">
        <h1>🌤️ Weather Search</h1>
        <p class="subtitle">Get current weather for any city</p>

        <form method="POST" action="/weather">
            <input type="text" name="city" class="form-control mb-3" placeholder="Enter city name..." required autofocus>
            <button class="btn btn-primary w-100">Get Weather</button>
        </form>
    </div>
</body>
</html>
